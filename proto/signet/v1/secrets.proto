syntax = "proto3";

package signet.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service SecretsService {
  rpc GetSecret(GetSecretRequest)                           returns (GetSecretResponse);
  rpc WatchSecret(WatchSecretRequest)                       returns (stream WatchSecretResponse);
  rpc GetConfig(GetConfigRequest)                           returns (GetConfigResponse);
  rpc GetServiceConfig(GetServiceConfigRequest)             returns (GetServiceConfigResponse);
  rpc WatchServiceConfig(WatchServiceConfigRequest)         returns (stream WatchServiceConfigResponse);
  // GetServiceBundle returns config and all secrets merged into a single structured document.
  // Secrets are base64-encoded under the reserved "secrets" key.
  rpc GetServiceBundle(GetServiceBundleRequest)             returns (GetServiceBundleResponse);
  // WatchServiceBundle sends a notification when any secret or config for the service
  // changes. No values are sent — clients should respond by restarting and calling
  // GetServiceBundle fresh. Does not send an initial event on connection.
  rpc WatchServiceBundle(WatchServiceBundleRequest)         returns (stream WatchServiceBundleResponse);
  // AcquireRestartLock is a bidirectional streaming RPC for coordinating rolling
  // restarts. The client sends an initial message to enter the queue; the server
  // streams queue position updates while the caller waits, then sends ACQUIRED when
  // the lock is granted. The lock is held for as long as the stream remains open —
  // closing the stream releases it. Clients send heartbeat messages to extend the
  // TTL while holding. ttl_seconds must be provided by the client; no server-side
  // default exists.
  rpc AcquireRestartLock(stream AcquireRestartLockRequest)  returns (stream AcquireRestartLockResponse);
}

message GetSecretRequest {
  string namespace = 1;
  string service   = 2;
  string name      = 3;
}

message GetSecretResponse {
  bytes value   = 1;
  int32 version = 2;
}

message WatchSecretRequest {
  string namespace = 1;
  string service   = 2;
  string name      = 3;
}

// WatchSecretResponse is streamed to the client whenever the watched secret changes.
message WatchSecretResponse {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_UPDATED     = 1;
    EVENT_TYPE_DELETED     = 2;
  }
  EventType event_type = 1;
  string    namespace  = 2;
  string    service    = 3;
  string    name       = 4;
  bytes     value      = 5;
  int32     version    = 6;
}

message GetConfigRequest {
  string namespace = 1;
  string service   = 2;
  // key is a dot-path into the config document, e.g. "db.host" or "port".
  // Use GetServiceConfig to retrieve the full document.
  string key       = 3;
}

message GetConfigResponse {
  // value is the JSON-typed value at the requested key path.
  google.protobuf.Value value   = 1;
  int32                 version = 2;
}

message GetServiceConfigRequest {
  string namespace = 1;
  string service   = 2;
}

message GetServiceConfigResponse {
  // values is the full configuration document as a structured JSON object.
  google.protobuf.Struct values  = 1;
  int32                  version = 2;
}

message WatchServiceConfigRequest {
  string namespace = 1;
  string service   = 2;
}

message GetServiceBundleRequest {
  string namespace = 1;
  string service   = 2;
}

message GetServiceBundleResponse {
  // bundle contains config keys at the top level plus a reserved "secrets" key
  // whose value is a map of secret names to base64-encoded plaintext values.
  google.protobuf.Struct bundle         = 1;
  // config_version is the version of the config document at the time of this
  // response; 0 if no config has been stored for this service.
  int32                  config_version = 2;
}

message WatchServiceBundleRequest {
  string namespace = 1;
  string service   = 2;
}

// WatchServiceBundleResponse is a change notification — no values are included.
// Clients should respond by initiating a coordinated shutdown and calling
// GetServiceBundle on the next startup to pick up the updated values.
message WatchServiceBundleResponse {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    // EVENT_TYPE_CHANGED fires when any secret or config for this service changes.
    EVENT_TYPE_CHANGED     = 1;
  }
  EventType event_type = 1;
  string    namespace  = 2;
  string    service    = 3;
}

message AcquireRestartLockRequest {
  // namespace and service identify the lock. Set on the first message only;
  // ignored on subsequent heartbeat messages.
  string namespace   = 1;
  string service     = 2;
  // ttl_seconds is the lock TTL in seconds. Required on the first message and
  // must be > 0; the server returns InvalidArgument if absent. On heartbeat
  // messages ttl_seconds specifies the new TTL extension duration; if 0 the
  // original ttl_seconds value is reused.
  int32  ttl_seconds = 3;
  // heartbeat, when true on messages after the first, extends the lock TTL.
  // Heartbeats sent while waiting in the queue are silently ignored.
  bool   heartbeat   = 4;
}

message AcquireRestartLockResponse {
  enum MessageType {
    MESSAGE_TYPE_UNSPECIFIED    = 0;
    // QUEUE_POSITION: the caller is waiting; position is their 1-based place in
    // the queue (1 = next in line). A new message is sent whenever position changes.
    MESSAGE_TYPE_QUEUE_POSITION = 1;
    // ACQUIRED: the lock is now held. The stream remaining open holds the lock;
    // closing the stream releases it. No further QUEUE_POSITION messages are sent.
    MESSAGE_TYPE_ACQUIRED       = 2;
    // TTL_EXTENDED: sent in response to a heartbeat confirming the new expiry.
    MESSAGE_TYPE_TTL_EXTENDED   = 3;
  }
  MessageType               message_type = 1;
  // position is set when message_type is MESSAGE_TYPE_QUEUE_POSITION.
  int32                     position     = 2;
  // token is set when message_type is MESSAGE_TYPE_ACQUIRED.
  // Identifies this acquisition in audit logs.
  string                    token        = 3;
  // expires_at is set when message_type is MESSAGE_TYPE_ACQUIRED or MESSAGE_TYPE_TTL_EXTENDED.
  google.protobuf.Timestamp expires_at   = 4;
}

// WatchServiceConfigResponse is streamed whenever the service config changes.
message WatchServiceConfigResponse {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_UPDATED     = 1;
    EVENT_TYPE_DELETED     = 2;
  }
  EventType              event_type = 1;
  string                 namespace  = 2;
  string                 service    = 3;
  // values is empty when event_type is EVENT_TYPE_DELETED.
  google.protobuf.Struct values     = 4;
  int32                  version    = 5;
}
