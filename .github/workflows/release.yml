name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  label-bsr:
    name: Label BSR release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf push with version label
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: buf push --label "${{ github.ref_name }}"

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: label-bsr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-from-tag
