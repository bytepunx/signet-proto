name: Publish

# Pushes the schema to the Buf Schema Registry's "main" track on every merge to
# main, so BSR history mirrors git history. Tagged releases are additionally
# labeled in release.yml so consumers can pin to a stable, human-readable version.

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  push-bsr:
    name: buf push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf push
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        # --create is a no-op once the module exists; keeps first-ever push self-service.
        run: buf push --create --create-visibility public
